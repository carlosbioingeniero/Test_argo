apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-injection-demo-env
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_ME_REPO_URL
    targetRevision: HEAD
    path: tests/argo-helm-config-analysis/charts/config-injection-demo
    helm:
      parameters:
        - name: mode
          value: env
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-helm-config-test-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
